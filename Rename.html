<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶帳戶餘額追蹤</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f5f0;
  color: #1a1a18;
  min-height: 100vh;
  padding: 2rem 1rem;
  font-size: 14px;
}
.container { max-width: 1020px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
.metric { background: #eaeae6; border-radius: 8px; padding: 14px; }
.metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 500; }
.metric-value.danger { color: #c0392b; }
.metric-value.success { color: #16a34a; }

.card {
  background: #fff;
  border: 1px solid #e0e0da;
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
}

.tab-bar { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: #666;
}
.tab.active { background: #fff; border: 1px solid #e0e0da; color: #1a1a18; font-weight: 500; }
.tab:hover:not(.active) { background: #eaeae6; }

.view { display: none; }
.view.active { display: block; }

.table-wrap { background: #fff; border: 1px solid #e0e0da; border-radius: 12px; overflow: hidden; }
.t-head {
  display: grid;
  padding: 9px 1rem;
  background: #f5f5f0;
  border-bottom: 1px solid #e0e0da;
  font-size: 12px;
  color: #666;
  font-weight: 500;
}
.t-row {
  display: grid;
  padding: 10px 1rem;
  border-bottom: 1px solid #f0f0ec;
  align-items: center;
}
.t-row:last-child { border-bottom: none; }
.t-row:hover { background: #fafaf8; }
.t-row.month-summary {
  background: #f5f5f0;
  border-bottom: 2px solid #e0e0da;
  font-weight: 500;
}
.t-row.month-summary:hover { background: #eeeee8; }
.t-row.month-row { cursor: pointer; }

.acct-grid { grid-template-columns: 100px 80px 110px 110px 110px 68px 40px; }
.monthly-grid { grid-template-columns: 90px 70px 110px 110px 110px 110px 36px; }
.order-grid { grid-template-columns: 160px 90px 90px 24px; }
.order-detail-grid { grid-template-columns: 160px 90px 90px 1fr 36px; }
.all-order-grid { grid-template-columns: 90px 160px 90px 90px 1fr 36px; }

.badge { font-size: 11px; padding: 2px 7px; border-radius: 5px; font-weight: 500; display: inline-block; }
.badge-ok { background: #dcfce7; color: #166534; }
.badge-low { background: #fef9c3; color: #854d0e; }
.badge-empty { background: #fee2e2; color: #991b1b; }

.green { color: #16a34a; font-weight: 500; }
.red { color: #dc2626; font-weight: 500; }
.orange { color: #d97706; font-weight: 500; }
.muted { color: #999; font-size: 13px; }
.bold { font-weight: 500; }
.right { text-align: right; }
.empty-state { padding: 2rem; text-align: center; color: #aaa; font-size: 14px; }

.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 110px; }
.form-group label { font-size: 12px; color: #666; }
input, select {
  height: 36px; border: 1px solid #d0d0ca; border-radius: 6px;
  padding: 0 10px; font-size: 14px; background: #fff; color: #1a1a18; outline: none; width: 100%;
}
input:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }

.btn { height: 36px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; padding: 0 16px; white-space: nowrap; flex-shrink: 0; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-outline { background: transparent; border: 1px solid #ccc; color: #444; }
.btn-outline:hover { background: #f0f0ec; }
.btn-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 15px; padding: 2px 5px; border-radius: 4px; }
.btn-del:hover { background: #fee2e2; color: #dc2626; }
.btn-expand { background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; padding: 2px 4px; }

.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.section-title { font-size: 13px; font-weight: 500; color: #555; }

.chip { display: inline-block; background: #e8e8e4; border-radius: 4px; padding: 2px 7px; font-size: 12px; color: #555; }
.acct-link { color: #2563eb; cursor: pointer; }
.acct-link:hover { text-decoration: underline; }

.sub-rows { display: none; }
.sub-rows.open { display: block; }
.sub-head {
  display: grid;
  padding: 7px 1rem 7px 2rem;
  background: #fafaf8;
  border-bottom: 1px solid #f0f0ec;
  font-size: 11px; color: #888; font-weight: 500;
}
.sub-row {
  display: grid;
  padding: 8px 1rem 8px 2rem;
  border-bottom: 1px solid #f8f8f6;
  font-size: 13px;
  align-items: center;
}
.sub-row:last-child { border-bottom: 0.5px solid #e8e8e4; }
.sub-row:hover { background: #fafaf8; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1a18; color: #fff;
  padding: 10px 18px; border-radius: 8px;
  font-size: 14px; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

.bal-positive { color: #16a34a; font-weight: 500; }
.bal-low { color: #d97706; font-weight: 500; }
.bal-zero { color: #dc2626; font-weight: 500; }

.deposit-badge { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: #dcfce7; color: #166534; margin-left: 4px; }
.editable-cell { cursor: pointer; border-bottom: 1px dashed #ccc; padding-bottom: 1px; }
.editable-cell:hover { background: #f0f7ff; border-radius: 3px; }
.sort-col { cursor: pointer; user-select: none; }
.sort-col:hover { color: #333; }
.dep-row { display: grid; grid-template-columns: 130px 120px 1fr 32px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; }
.dep-row:last-child { border-bottom: none; }
.dep-month-input { height: 30px; font-size: 13px; border: 1px solid #3b82f6; border-radius: 4px; padding: 0 8px; }
.dep-amount-input { height: 30px; font-size: 13px; border: 1px solid #3b82f6; border-radius: 4px; padding: 0 8px; width: 120px; }
.inline-input { height: 26px; font-size: 13px; border: 1px solid #3b82f6; border-radius: 4px; padding: 0 6px; width: 100%; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 style="margin-bottom:0">客戶帳戶餘額追蹤</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-outline" style="font-size:12px;height:30px;padding:0 12px" onclick="backupJSON()">📥 備份</button>
      <label class="btn btn-outline" style="font-size:12px;height:30px;padding:0 12px;cursor:pointer;display:flex;align-items:center">
        📤 還原<input type="file" accept=".json" style="display:none" onchange="restoreJSON(event)">
      </label>
      <span style="font-size:12px;color:#aaa;background:#eaeae6;padding:3px 10px;border-radius:20px;font-weight:500">v1.0</span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">客戶人數</div><div class="metric-value" id="m-count">0</div></div>
    <div class="metric"><div class="metric-label">訂單總數</div><div class="metric-value" id="m-orders">0</div></div>
    <div class="metric"><div class="metric-label">總餘額</div><div class="metric-value success" id="m-total">NT$0</div></div>
    <div class="metric"><div class="metric-label">餘額不足客戶</div><div class="metric-value danger" id="m-low">0</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('accounts')">帳戶總覽</button>
    <button class="tab" onclick="switchTab('monthly')">月結餘</button>
    <button class="tab" onclick="switchTab('orders')">訂單明細</button>
    <button class="tab" onclick="switchTab('add')">新增資料</button>
  </div>

  <!-- 帳戶總覽 -->
  <div id="view-accounts" class="view active">
    <div class="top-bar">
      <div class="section-title">所有客戶</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="depositAll()">全部匯入 NT$10,000</button>
        <button class="btn btn-outline" onclick="exportCSV()">匯出 CSV</button>
        <button class="btn btn-outline" onclick="exportAccountsExcel()">匯出 Excel</button>
      </div>
    </div>
    <div class="table-wrap">
      <div class="t-head acct-grid">
        <span>客戶編號</span><span>訂單數</span><span>累計扣款</span><span>累計存入</span><span>目前餘額</span><span>狀態</span><span></span>
      </div>
      <div id="acct-body"></div>
    </div>
  </div>

  <!-- 月結餘 -->
  <div id="view-monthly" class="view">
    <div class="top-bar">
      <div class="section-title">月結餘明細</div>
      <select id="monthly-cid" onchange="renderMonthly()" style="width:160px">
        <option value="">選擇客戶</option>
      </select>
    </div>

    <!-- 存款管理 -->
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-title">存款紀錄</div>
        <button class="btn btn-outline" style="height:30px;font-size:12px;padding:0 12px" onclick="exportMonthlyExcel()">匯出 Excel</button>
        <button class="btn btn-outline" style="height:30px;font-size:12px;padding:0 12px" onclick="addDepositInline()">+ 新增存款</button>
      </div>
      <div id="deposit-list">
        <div class="empty-state" style="padding:1rem">請先選擇客戶</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="t-head monthly-grid">
        <span>年月</span><span>訂單數</span><span>當月扣款</span><span>當月存入</span><span>當月結餘</span><span>累積餘額</span><span></span>
      </div>
      <div id="monthly-body"></div>
    </div>
  </div>

  <!-- 訂單明細 -->
  <div id="view-orders" class="view">
    <div class="top-bar">
      <div class="section-title">所有訂單</div>
      <button class="btn btn-outline" onclick="exportOrdersExcel()">匯出 Excel</button>
      <input type="text" id="order-search" placeholder="搜尋客戶或訂單編號" style="width:220px" oninput="renderOrders()">
    </div>
      <div class="table-wrap">
      <div class="t-head all-order-grid">
        <span>客戶編號</span>
        <span class="sort-col" onclick="setOrderSort('oid')" title="點擊排序">訂單編號 <span id="sort-oid"></span></span>
        <span class="sort-col" onclick="setOrderSort('date')" title="點擊排序">日期 <span id="sort-date">▼</span></span>
        <span class="sort-col" onclick="setOrderSort('amount')" title="點擊排序">金額 <span id="sort-amount"></span></span>
        <span>備註</span><span></span>
      </div>
      <div id="order-body"></div>
    </div>
  </div>

  <!-- 新增資料 -->
  <div id="view-add" class="view">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
      <div class="card">
        <div class="section-title" style="margin-bottom:12px">新增客戶</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="form-group"><label>客戶編號</label><input type="text" id="new-cid" placeholder="例：TWC0001"></div>
          <button class="btn btn-primary" onclick="addCustomer()">建立客戶</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title" style="margin-bottom:12px">新增存款</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="form-group"><label>客戶編號</label><select id="dep-cid"><option value="">選擇客戶</option></select></div>
          <div class="form-group"><label>年月</label><input type="month" id="dep-month"></div>
          <div class="form-group"><label>存入金額</label><input type="number" id="dep-amount" placeholder="10000" min="0"></div>
          <button class="btn btn-primary" onclick="depositOne()">存入</button>
        </div>
      </div>

      <div class="card" style="grid-column:1/-1">
        <div class="section-title" style="margin-bottom:12px">新增訂單（扣款）</div>
        <div class="form-row">
          <div class="form-group"><label>客戶編號</label><select id="o-cid"><option value="">選擇客戶</option></select></div>
          <div class="form-group"><label>訂單編號</label><input type="text" id="o-oid" placeholder="CS301-XXXXXXXXX"></div>
          <div class="form-group"><label>日期</label><input type="date" id="o-date"></div>
          <div class="form-group"><label>金額</label><input type="number" id="o-amount" placeholder="0" min="0"></div>
          <div class="form-group"><label>備註</label><input type="text" id="o-note" placeholder="選填"></div>
          <button class="btn btn-primary" onclick="addOrder()">新增</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let accounts = JSON.parse(localStorage.getItem('acct_v4') || 'null') || [];

function save() { try { localStorage.setItem('acct_v4', JSON.stringify(accounts)); } catch(e){} }

function getDeducted(acct) { return acct.orders.reduce((s,o) => s + (o.amount||0), 0); }
function getDeposited(acct) { return (acct.deposits||[]).reduce((s,d) => s + d.amount, 0); }
function getBalance(acct) { return getDeposited(acct) - getDeducted(acct); }

function fmt(n) { return 'NT$' + Math.round(n).toLocaleString(); }

function badgeFor(bal) {
  if (bal <= 0) return '<span class="badge badge-empty">餘額歸零</span>';
  if (bal < 2000) return '<span class="badge badge-low">偏低</span>';
  return '<span class="badge badge-ok">正常</span>';
}

function balClass(bal) {
  if (bal <= 0) return 'bal-zero';
  if (bal < 2000) return 'bal-low';
  return 'bal-positive';
}

function getMonthlyData(acct) {
  const byMonth = {};
  for (const o of acct.orders) {
    const m = o.date ? o.date.slice(0,7) : '0000-00';
    if (!byMonth[m]) byMonth[m] = { deducted: 0, deposited: 0, orders: [] };
    byMonth[m].deducted += (o.amount||0);
    byMonth[m].orders.push(o);
  }
  for (const d of (acct.deposits||[])) {
    const m = d.month;
    if (!byMonth[m]) byMonth[m] = { deducted: 0, deposited: 0, orders: [] };
    byMonth[m].deposited += d.amount;
  }
  const months = Object.keys(byMonth).sort();
  let running = 0;
  return months.map(m => {
    const row = byMonth[m];
    const net = row.deposited - row.deducted;
    running += net;
    return { month: m, orders: row.orders, deducted: row.deducted, deposited: row.deposited, net, balance: running };
  });
}

function renderAccounts() {
  const body = document.getElementById('acct-body');
  if (!accounts.length) {
    body.innerHTML = '<div class="empty-state">尚無客戶，請前往「新增資料」建立</div>'; return;
  }
  body.innerHTML = accounts.map((a, i) => {
    const bal = getBalance(a);
    return `<div class="t-row acct-grid">
      <span class="bold acct-link" onclick="switchTab('monthly');setMonthlyCid('${a.id}')">${a.id}</span>
      <span><span class="chip">${a.orders.length}</span></span>
      <span class="red">${fmt(getDeducted(a))}</span>
      <span class="green">${fmt(getDeposited(a))}</span>
      <span class="${balClass(bal)}">${fmt(bal)}</span>
      <span>${badgeFor(bal)}</span>
      <span><button class="btn-del" onclick="deleteAccount(${i})">✕</button></span>
    </div>`;
  }).join('');
}

function renderDepositList() {
  const cid = document.getElementById('monthly-cid').value;
  const el = document.getElementById('deposit-list');
  if (!cid) { el.innerHTML = '<div class="empty-state" style="padding:1rem">請先選擇客戶</div>'; return; }
  const acct = accounts.find(a => a.id === cid);
  if (!acct || !(acct.deposits||[]).length) {
    el.innerHTML = '<div class="empty-state" style="padding:1rem">尚無存款紀錄，點右上角「+ 新增存款」</div>'; return;
  }
  el.innerHTML = acct.deposits.map((d, i) => `
    <div class="dep-row">
      <input class="dep-month-input" type="month" value="${d.month}" onchange="updateDeposit('${cid}',${i},'month',this.value)">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:#666">NT$</span>
        <input class="dep-amount-input" type="number" value="${d.amount}" min="0" onchange="updateDeposit('${cid}',${i},'amount',this.value)">
      </div>
      <span style="color:#999;font-size:12px">修改後自動儲存</span>
      <button class="btn-del" onclick="deleteDeposit('${cid}',${i})">✕</button>
    </div>`).join('');
}

function fixMonth(m) {
  if (!m) return m;
  var parts = m.split('-');
  if (parts.length === 2) {
    return parts[0] + '-' + parts[1].padStart(2, '0');
  }
  return m;
}

function fixAllMonths() {
  var changed = false;
  for (var a of accounts) {
    for (var d of (a.deposits || [])) {
      var fixed = fixMonth(d.month);
      if (fixed !== d.month) { d.month = fixed; changed = true; }
    }
    for (var o of (a.orders || [])) {
      if (o.date) {
        var parts = o.date.split('-');
        if (parts.length === 3) {
          var fixed = parts[0] + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0');
          if (fixed !== o.date) { o.date = fixed; changed = true; }
        }
      }
    }
  }
  if (changed) { save(); toast('已自動修正月份格式'); }
}

function updateDeposit(cid, idx, field, val) {
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  if (field === 'amount') acct.deposits[idx].amount = parseFloat(val) || 0;
  if (field === 'month') acct.deposits[idx].month = fixMonth(val);
  save(); renderMonthly(); renderAccounts(); renderMetrics();
  toast('存款已更新');
}

function deleteDeposit(cid, idx) {
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  if (!confirm('確定刪除此存款紀錄？')) return;
  acct.deposits.splice(idx, 1);
  save(); render(); renderDepositList();
  toast('存款紀錄已刪除');
}

function addDepositInline() {
  const cid = document.getElementById('monthly-cid').value;
  if (!cid) { alert('請先選擇客戶'); return; }
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  if (!acct.deposits) acct.deposits = [];
  const thisMonth = new Date().toISOString().slice(0,7);
  acct.deposits.push({ month: thisMonth, amount: 10000 });
  save(); render(); renderDepositList();
  toast('已新增存款，請修改月份和金額');
}

function renderMonthly() {
  renderDepositList();
  const cid = document.getElementById('monthly-cid').value;
  const body = document.getElementById('monthly-body');
  if (!cid) { body.innerHTML = '<div class="empty-state">請選擇客戶</div>'; return; }
  const acct = accounts.find(a => a.id === cid);
  if (!acct) { body.innerHTML = '<div class="empty-state">找不到客戶</div>'; return; }

  const rows = getMonthlyData(acct);
  if (!rows.length) { body.innerHTML = '<div class="empty-state">尚無資料</div>'; return; }

  body.innerHTML = rows.map((r, ri) => {
    const hasOrders = r.orders.length > 0;
    const subId = `sub-${ri}`;
    const subRows = r.orders.map((o, oi) => `
      <div class="sub-row order-detail-grid">
        <span class="muted">${o.oid}</span>
        <span class="muted">${o.date}</span>
        <span class="editable-cell ${o.amount ? 'red' : 'muted'}" title="點擊編輯金額" onclick="inlineEditAmount('${cid}','${o.oid}',this)">${o.amount ? Math.round(o.amount).toLocaleString() : '點擊填入'}</span>
        <span class="editable-cell muted" title="點擊編輯備註" onclick="inlineEditNote('${cid}','${o.oid}',this)">${o.note||'點擊填入'}</span>
        <span><button class="btn-del" onclick="deleteOrderFromAcct('${cid}','${o.oid}')">✕</button></span>
      </div>`).join('');

    const depBadge = r.deposited > 0 ? `<span class="deposit-badge">+${fmt(r.deposited)}</span>` : '';

    return `
      <div class="t-row monthly-grid month-row" onclick="toggleSub('${subId}', this)">
        <span class="bold">${r.month}</span>
        <span><span class="chip">${r.orders.length}</span></span>
        <span class="red">${r.deducted ? fmt(r.deducted) : '—'}</span>
        <span class="green">${r.deposited ? fmt(r.deposited) : '—'}</span>
        <span class="${r.net >= 0 ? 'green' : 'red'}">${r.net >= 0 ? '+' : ''}${fmt(r.net)}</span>
        <span class="${balClass(r.balance)}">${fmt(r.balance)}</span>
        <span class="btn-expand">${hasOrders ? '▸' : ''}</span>
      </div>
      ${hasOrders ? `<div class="sub-rows" id="${subId}">
        <div class="sub-head order-detail-grid"><span>訂單編號</span><span>日期</span><span>金額</span><span>備註</span><span></span></div>
        ${subRows}
      </div>` : ''}`;
  }).join('');
}

function toggleSub(id, row) {
  const el = document.getElementById(id);
  if (!el) return;
  const arrow = row.querySelector('.btn-expand');
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    if (arrow) arrow.textContent = '▸';
  } else {
    el.classList.add('open');
    if (arrow) arrow.textContent = '▾';
  }
}

let orderSortKey = 'date';
let orderSortDir = -1; // -1=降冪, 1=升冪

function setOrderSort(key) {
  if (orderSortKey === key) {
    orderSortDir *= -1;
  } else {
    orderSortKey = key;
    orderSortDir = key === 'date' ? -1 : 1;
  }
  ['oid','date','amount'].forEach(function(k) {
    var el = document.getElementById('sort-' + k);
    if (el) el.textContent = '';
  });
  var el = document.getElementById('sort-' + key);
  if (el) el.textContent = orderSortDir === -1 ? '▼' : '▲';
  renderOrders();
}

function renderOrders() {
  const q = (document.getElementById('order-search').value||'').toLowerCase();
  const body = document.getElementById('order-body');
  let rows = [];
  for (const a of accounts) {
    for (const o of a.orders) {
      if (!q || a.id.toLowerCase().includes(q) || o.oid.toLowerCase().includes(q)) {
        rows.push({ cid: a.id, o });
      }
    }
  }
  rows.sort((a, b) => {
    let va = a.o[orderSortKey] || '';
    let vb = b.o[orderSortKey] || '';
    if (orderSortKey === 'amount') { va = va || 0; vb = vb || 0; }
    if (va < vb) return -1 * orderSortDir;
    if (va > vb) return 1 * orderSortDir;
    return 0;
  });
  if (!rows.length) { body.innerHTML = '<div class="empty-state">無符合結果</div>'; return; }
  body.innerHTML = rows.map(r => `
    <div class="t-row all-order-grid">
      <span class="bold acct-link" onclick="switchTab('monthly');setMonthlyCid('${r.cid}')">${r.cid}</span>
      <span class="muted">${r.o.oid}</span>
      <span class="muted">${r.o.date}</span>
      <span class="editable-cell ${r.o.amount ? 'red' : 'muted'}" title="點擊編輯金額" onclick="inlineEditAmount('${r.cid}','${r.o.oid}',this)">${r.o.amount ? Math.round(r.o.amount).toLocaleString() : '點擊填入'}</span>
      <span class="editable-cell muted" title="點擊編輯備註" onclick="inlineEditNote('${r.cid}','${r.o.oid}',this)">${r.o.note||'點擊填入'}</span>
      <span><button class="btn-del" onclick="deleteOrderFromAcct('${r.cid}','${r.o.oid}');renderOrders()">✕</button></span>
    </div>`).join('');
}

function renderMetrics() {
  document.getElementById('m-count').textContent = accounts.length;
  document.getElementById('m-orders').textContent = accounts.reduce((s,a)=>s+a.orders.length,0);
  document.getElementById('m-total').textContent = fmt(accounts.reduce((s,a)=>s+getBalance(a),0));
  document.getElementById('m-low').textContent = accounts.filter(a=>getBalance(a)<2000).length;
}

function updateCidSelect() {
  var opts = '<option value="">選擇客戶</option>' +
    accounts.map(function(a) { return '<option value="' + a.id + '">' + a.id + '</option>'; }).join('');
  ['monthly-cid','o-cid','dep-cid'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var cur = el.value;
    el.innerHTML = opts;
    if (cur) el.value = cur;
  });
}

function render() { renderAccounts(); renderOrders(); renderMetrics(); updateCidSelect(); renderMonthly(); }

function setMonthlyCid(id) {
  document.getElementById('monthly-cid').value = id;
  renderMonthly();
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  const tabs = ['accounts','monthly','orders','add'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function addCustomer() {
  const id = document.getElementById('new-cid').value.trim();
  if (!id) { alert('請輸入客戶編號'); return; }
  if (accounts.find(a => a.id === id)) { alert('客戶已存在'); return; }
  accounts.push({ id, deposits: [], orders: [] });
  save(); render();
  document.getElementById('new-cid').value = '';
  toast('客戶已建立');
}

function addOrder() {
  const cid = document.getElementById('o-cid').value.trim();
  const oid = document.getElementById('o-oid').value.trim();
  const date = document.getElementById('o-date').value;
  const amount = parseFloat(document.getElementById('o-amount').value)||0;
  const note = document.getElementById('o-note').value.trim();
  if (!cid||!oid||!date) { alert('請填寫客戶編號、訂單編號、日期'); return; }
  const acct = accounts.find(a => a.id === cid);
  if (!acct) { alert('找不到客戶，請先建立'); return; }
  acct.orders.push({ oid, date, amount, note });
  save(); render();
  document.getElementById('o-oid').value = '';
  document.getElementById('o-amount').value = '';
  document.getElementById('o-note').value = '';
  toast('訂單已新增');
}

function depositOne() {
  const cid = document.getElementById('dep-cid').value.trim();
  const month = document.getElementById('dep-month').value;
  const amount = parseFloat(document.getElementById('dep-amount').value)||0;
  if (!cid||!month||!amount) { alert('請填寫完整資料'); return; }
  const acct = accounts.find(a => a.id === cid);
  if (!acct) { alert('找不到客戶'); return; }
  if (!acct.deposits) acct.deposits = [];
  acct.deposits.push({ month, amount });
  save(); render();
  document.getElementById('dep-cid').value = '';
  document.getElementById('dep-amount').value = '';
  toast(`${cid} ${month} 已存入 ${fmt(amount)}`);
}

function depositAll() {
  const month = prompt('請輸入年月（格式：2024-10）');
  if (!month) return;
  const amount = parseFloat(prompt('存入金額', '10000'))||0;
  if (!amount) return;
  for (const a of accounts) {
    if (!a.deposits) a.deposits = [];
    a.deposits.push({ month, amount });
  }
  save(); render();
  toast(`全部客戶 ${month} 已存入 ${fmt(amount)}`);
}

function deleteAccount(i) {
  if (!confirm('確定刪除「'+accounts[i].id+'」？')) return;
  accounts.splice(i,1);
  save(); render();
  toast('已刪除');
}

function deleteOrderFromAcct(cid, oid) {
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  const idx = acct.orders.findIndex(o => o.oid === oid);
  if (idx === -1) return;
  if (!confirm('確定刪除訂單「'+oid+'」？')) return;
  acct.orders.splice(idx, 1);
  save(); render();
  toast('訂單已刪除');
}

function inlineEditAmount(cid, oid, cell) {
  if (cell.querySelector('input')) return;
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  const order = acct.orders.find(o => o.oid === oid);
  if (!order) return;
  const cur = order.amount || '';
  cell.innerHTML = `<input class="inline-input" type="number" value="${cur}" min="0" placeholder="金額">`;
  const inp = cell.querySelector('input');
  inp.focus(); inp.select();
  function commit() {
    const val = parseFloat(inp.value) || 0;
    order.amount = val;
    save(); render();
    toast('金額已更新：' + fmt(val));
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { render(); }
  });
}

function inlineEditNote(cid, oid, cell) {
  if (cell.querySelector('input')) return;
  const acct = accounts.find(a => a.id === cid);
  if (!acct) return;
  const order = acct.orders.find(o => o.oid === oid);
  if (!order) return;
  const cur = order.note || '';
  cell.innerHTML = `<input class="inline-input" type="text" value="${cur}" placeholder="備註">`;
  const inp = cell.querySelector('input');
  inp.focus(); inp.select();
  function commit() {
    order.note = inp.value.trim();
    save(); render();
    toast('備註已更新');
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { render(); }
  });
}


function exportExcel(sheetData, sheetName, filename) {
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(sheetData);
  // 自動欄寬
  var colWidths = sheetData[0].map(function(_, ci) {
    return { wch: Math.max.apply(null, sheetData.map(function(r) {
      return r[ci] ? String(r[ci]).length + 2 : 10;
    })) };
  });
  ws['!cols'] = colWidths;
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, filename);
  toast('Excel 已下載');
}

function exportAccountsExcel() {
  var rows = [['客戶編號','訂單數','累計扣款','累計存入','目前餘額','狀態']];
  accounts.forEach(function(a) {
    var bal = getBalance(a);
    var status = bal <= 0 ? '餘額歸零' : bal < 2000 ? '偏低' : '正常';
    rows.push([a.id, a.orders.length, getDeducted(a), getDeposited(a), bal, status]);
  });
  exportExcel(rows, '帳戶總覽', '帳戶總覽.xlsx');
}

function exportMonthlyExcel() {
  var cid = document.getElementById('monthly-cid').value;
  if (!cid) { alert('請先選擇客戶'); return; }
  var acct = accounts.find(function(a) { return a.id === cid; });
  if (!acct) return;
  var rows = [['年月','訂單數','當月扣款','當月存入','當月結餘','累積餘額']];
  var monthlyData = getMonthlyData(acct);
  monthlyData.forEach(function(r) {
    rows.push([r.month, r.orders.length, r.deducted, r.deposited, r.net, r.balance]);
  });
  // 存款明細另一個 sheet
  var depRows = [['月份','金額','備註']];
  (acct.deposits || []).forEach(function(d) {
    depRows.push([d.month, d.amount, d.note || '']);
  });
  var wb = XLSX.utils.book_new();
  var ws1 = XLSX.utils.aoa_to_sheet(rows);
  var ws2 = XLSX.utils.aoa_to_sheet(depRows);
  ws1['!cols'] = rows[0].map(function(_, ci) {
    return { wch: Math.max.apply(null, rows.map(function(r) { return r[ci] ? String(r[ci]).length + 2 : 10; })) };
  });
  ws2['!cols'] = depRows[0].map(function(_, ci) {
    return { wch: Math.max.apply(null, depRows.map(function(r) { return r[ci] ? String(r[ci]).length + 2 : 10; })) };
  });
  XLSX.utils.book_append_sheet(wb, ws1, '月結餘');
  XLSX.utils.book_append_sheet(wb, ws2, '存款明細');
  XLSX.writeFile(wb, cid + '_月結餘.xlsx');
  toast('Excel 已下載');
}

function exportOrdersExcel() {
  var q = (document.getElementById('order-search').value || '').toLowerCase();
  var rows = [['客戶編號','訂單編號','日期','金額','備註']];
  accounts.forEach(function(a) {
    a.orders.forEach(function(o) {
      if (!q || a.id.toLowerCase().includes(q) || o.oid.toLowerCase().includes(q)) {
        rows.push([a.id, o.oid, o.date, o.amount || 0, o.note || '']);
      }
    });
  });
  exportExcel(rows, '訂單明細', '訂單明細.xlsx');
}

function backupJSON() {
  var now = new Date();
  var ts = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes());
  var data = { version: 'v1.0', exportedAt: now.toISOString(), accounts: accounts };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = '帳戶備份_' + ts + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast('備份已下載：帳戶備份_' + ts + '.json');
}

function pad(n) { return String(n).padStart(2,'0'); }

function restoreJSON(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var restored = data.accounts || data;
      if (!Array.isArray(restored)) throw new Error('格式錯誤');
      if (!confirm('確定還原備份？目前資料將被覆蓋。\n備份時間：' + (data.exportedAt || '未知'))) return;
      accounts = restored;
      save();
      render();
      toast('還原成功！共 ' + accounts.length + ' 個客戶');
    } catch(err) {
      alert('還原失敗：檔案格式不正確\n' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function exportCSV() {
  let csv = '\uFEFF客戶編號,年月,訂單編號,日期,金額,備註,當月存入,月結餘,累積餘額\n';
  for (const a of accounts) {
    const rows = getMonthlyData(a);
    for (const r of rows) {
      if (!r.orders.length) {
        csv += `${a.id},${r.month},,,,, ${Math.round(r.deposited)},${Math.round(r.net)},${Math.round(r.balance)}\n`;
      } else {
        r.orders.forEach((o,i) => {
          csv += `${a.id},${r.month},${o.oid},${o.date},${o.amount||0},${o.note||''},${i===0?Math.round(r.deposited):''},${i===0?Math.round(r.net):''},${i===0?Math.round(r.balance):''}\n`;
        });
      }
    }
  }
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='客戶月結餘明細.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV 已下載');
}

document.getElementById('o-date').value = new Date().toISOString().slice(0,10);
document.getElementById('dep-month').value = new Date().toISOString().slice(0,7);
fixAllMonths();
render();
</script>
